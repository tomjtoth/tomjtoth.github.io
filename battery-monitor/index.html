<!DOCTYPE html>
<html lang="fi">
    <head>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>battery monitor</title>
    </head>
    <body>
        <p>
            This is a simple utility that can be autostarted and will alert when
            <ul>
                <li>either above the maximum threshold and still charging</li>
                <li>or below the minimum threshold and not charging</li>
            </ul>
            MS Edge and Chrome support the related <code>navigator.getBattery()</code> method, but Firefox does not QQ.
            Back to <a href="..">landing page</a>.
        </p>
        <div>
            <label>maximum threshold:</label>
            <input id="maximum" type="number" min="50" max="100" value="80">
        </div>
        <div>
            <label>minimum threshold:</label>
            <input id="minimum" type="number" min="0" max="50" value="20">
        </div>
        <div>
            <button id="start">start</button>
            <button id="stop">stop</button>
            <button id="autostart">toggle autostart</button>
        </div>
    </body>
    <script type="text/javascript" src="func.js"></script>
</html>
