<!DOCTYPE html>
<html lang="fi">
    <head>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>battery monitor</title>
    </head>
    <body>
        <p>
            This is a simple utility that can be autostarted and will alert when
            <ul>
                <li>either above the maximum threshold and still charging</li>
                <li>or below the minimum threshold and not charging</li>
            </ul>
            Chrome supports the realted <code>navigator.getBattery()</code> method, but Firefox does not QQ.
            Back to <a href="..">landing page</a>.
        </p>
        <div>
            <label>lower threshold:</label>
            <label>0</label>
            <input id="lower" type="range" min="0" max="50" value="20">
            <label>50</label>
        </div>
        <div>
            <label>upper threshold:</label>
            <label>50</label>
            <input id="upper" type="range" min="50" max="100" value="80">
            <label>100</label>
        </div>
        <div>
            <button id="start">start</button>
            <button id="stop">stop</button>
            <button id="autostart">toggle autostart</button>
        </div>
    </body>
    <script type="text/javascript" src="func.js"></script>
</html>
