<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ostoslista</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<style>
.dish_btn, .ingr_btn,
.dish_btn2, .ingr_btn2 {
    background-color: #666;
    color: white;
    cursor: pointer;
    padding: 18px;
    width: 100%;
    border: none;
    text-align: left;
    outline: none;
    font-size: 15px;
}

.dish_btn2, .ingr_btn2 {
    background-color: #888;
}

.dish_btn.active, .dish_btn2.active,
.dish_btn:hover, .dish_btn2:hover,
.ingr_btn:hover, .ingr_btn2:hover {
    background-color: #555;
}

.dish_div {
    padding: 0 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease-out;
    background-color: #f1f1f1;
}


.ingr_btn.active {
    background-color: #080;
}

.ingr_btn2.active {
    background-color: #2a2;
}
</style>
</head>
<body>

<button onclick="reset_checkboxes()">Reset Ticks</button>
<button onclick="shuffle()">Shuffle</button>

<h2>Ateriat</h2>
<div id="dishes"></div>

<h2>Ruokaaineet</h2>
<div id="ingredients"></div>

</body>

<script type="text/javascript">

const cookbook = Array.from(`
# 🌯 tortilla

# 🍖 karjalanpaisti

vihannekset


# 🍗 kana ja riisi

# 🍜 wokki

# 🍝 soijabolognese

# 🍲 broilerijauhelihapata

400 g kanajauheliha
sipuli
valkosipuli
mauste

liemikuutio

sitruunamehu


# 🐓 broilerivuoka

# 🐔 uunikana

2 porkkanaa
parsa- tai kukkakaali
oliivit
rosmariini


# 🐟 lohi

riisi?
perunat?
vihannekset


# 🐟 seiti

seiti
maissi
riisi?
500g perunaa?
curry?
kookosmaito tai -kerma


# 🐥 broilerikiusaus

1 kg peruna-sipulisekoitus
500 g kanasuikaleet
rosmariini
curry
2 kpl kerma

# 🐷 kinkkukiusaus

1 kg peruna-sipulisekoitus
300 g kotimaista keittokinkkua

vihannekset


# 🥕 vakioruoka

käytä toi UFO höyrytinjuttu

kilon porkkanat

# 🥘 pippurinen kanapata

400-600 g kanafileet
sipuli
100 g herkkusieniä
200 g ruusukaalia
kasvisliemikuutio
tomaattimurska
koskenlaskija-juusto
perunat


# 🥞 kuivakakku
@ dessert

2dl rusinoita
banaani
2dl banaanijogurttia
2 munaa
3dl sokeria


# 🫓 lángos

- 3dl jauhoa + suolaa laitat isoon kulhoon*
- maito mukiin -> 36˚
- siihen laitat hiivaa + sokeria
- 5 minuuttia annat ne piereskelemään, laitat jonnekin lämpimään
- kaadat mukin kulhoon*
- 1 sormella sekoitat, sitten összegyúrod

0,5dl maito
0,5 teeusikka sokeri
0,5 teelusikka suola
3dl vehnäjauho
50g hiiva (riittää 4 päivälle)
`
// https://regex101.com/r/ofnra6
.matchAll(/# (?<name>[^\n]+)\n(?:\@ (?<type>[^\n]+)\n)?\n(?:(?<instr>[^#]+?)\n\n)?(?<ingr>[^#]+?)(?:\n\n|\n$)/gms))
.map(mobj => {
    let name = mobj.groups.name;
    let type = mobj.groups.type;
    let instructions = mobj.groups.instr;
    let ingredients = mobj.groups.ingr.split('\n');
    return {name, type, instructions, ingredients}
});

// arranges ingredients the way I go through my local shop
const regexes = [
    /(cit+ari|K-supermarket|K-citimarket):?(sta)?/,
    /tokman+i/,
    /rosmari+ni|pi(ts|zz)amaus|la+kerinleh|kaneli|(musta.*)?pip+uri|cur+y|(kasvis)?liemi.*ku+t|(?!^(torti|gril+i).*)mauste/,
    /wraps|sinap+i|soijakast|salsa|tortil+.*maust|ketsup+i/,
    /kokis|kalja|olut|pepsi|mehu/,
    /banaani|omena|mandariini|sien(i|et)|vi+nirypä+le+|hedelmä|sitru+na|ru+suka+l/,
    /perun(a|oi).*(?!lastu|sipuli)|(?!^perun.*)sipuli|parsa.*ka+li|pork+ana|sala+t+i|(?!^wok.*)vihan+ek?s|bata+t+i/,
    /(?!^ko+kos.*)(mai[dt]o|kerma)|voi|jogh?urt|hi+va/,
    /(?!^veke)juusto|(koskenlask)?dip+i?/,
    /liha|kana(?!.*muna)|mifu/,
    /karjalanpa/,
    /kalk+una|kink+u/,
    /pitsa|ri+sipi+rak+a/,
    /perunalastu|pähkinä|sipsi/,
    /muna|oli+vi|toma+t+imurska|ananas|ko+kos/,
    /lei[pv]ä/,
    /nu+deli|makaroni|soija.*r.*h|ri+si|öljy/,
    /vehnäja|muro|mysli/,
    /sokeri/,
    /hernek/,
    /suklaa|kark+i/,
    /pakaste|jätski|jäätelö|wok+ivihan+e|peruna.*sipuli|sei[dt]i|mais+i|ben.*jer+y/,
    /vekeju+sto|loh[ei]/,
];

const html_ingredients = document.getElementById('ingredients');
const html_dishes = document.getElementById('dishes');

const menu = new Set(JSON.parse(localStorage.getItem('persistent')));

function reset_checkboxes() {
    return
}

function shuffle() {
    menu.clear();
    for (let i = 0; i < 7; i++) {
        let j;
        do {
            j = Math.floor(Math.random() * cookbook.length);
        } while (menu.has(j) || cookbook[j].type !== undefined);
        menu.add(j);
    }
    localStorage.setItem('persistent', JSON.stringify([...menu]));
    build();
}

function build() {
    // drop all current entries
    html_dishes.innerHTML = '';
    html_ingredients.innerHTML = '';

    const js_ingredients = new Map();
    js_ingredients.set(-1, []);
    let alternating = 0;

    for (const i of menu) {
        const dish = cookbook[i];

        // clickable button as name of dish
        const dish_btn = document.createElement('button');
        dish_btn.innerText = dish.name;

        dish_btn.setAttribute('class', alternating++ % 2 == 0 ? 'dish_btn' : 'dish_btn2');
        dish_btn.addEventListener('click', function() {
            this.classList.toggle('active');
            var content = this.nextElementSibling;
            if (content.style.maxHeight) {
                content.style.maxHeight = null;
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
            }
        });
        html_dishes.appendChild(dish_btn);

        // paragraph containing instructions
        const dish_p = document.createElement('p');
        dish_p.innerText = dish.instructions 
            ? dish.instructions 
            : 'Ohje puuttu, LYCKA TILL!';

        // div responsible for hiding/showing its child paragraph
        const dish_div = document.createElement('div');
        dish_div.setAttribute('class', 'dish_div');
        dish_div.appendChild(dish_p);
        html_dishes.appendChild(dish_div);        

        for (let ingredient of dish.ingredients) {
            let found = false;
            for (let i = 0; i < regexes.length; i ++) {
                if (ingredient.match(regexes[i])) {
                    if (!js_ingredients.has(i)) {
                        js_ingredients.set(i, [])
                    }

                    js_ingredients.get(i).push(`${ingredient} (${dish.name})`);
                    found = true;
                    break;
                }
            }
            if (!found) {
                js_ingredients.get(-1).push(`NOT FOUND: ${ingredient} (${dish.name})`)
            }
        }
    }

    for (const [order, ingredients] of [...js_ingredients.entries()].sort((a, b) => {
        let left = parseInt(a[0]);
        let right = parseInt(b[0]);
        if (left < right) {
            return -1;
        }
        if (left < right) {
            return 1;
        }
        return 0;
    })) {
        for (const ingredient of ingredients) {
            const ingr_btn = document.createElement('button');
            ingr_btn.innerText = ingredient;
            
            ingr_btn.setAttribute('class', alternating++ % 2 == 0 ? 'ingr_btn' : 'ingr_btn2');
            ingr_btn.addEventListener('click', function() {
                this.classList.toggle('active');
            });
            html_ingredients.appendChild(ingr_btn);
        }
    }
}
        
shuffle()
</script>

</html>
