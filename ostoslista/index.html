<!DOCTYPE html>
<html>
<head>
<title>ostoslista</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
</head>
<body>

<button onclick="hist()">History</button>
<button onclick="next()">Next</button>

<h2>Ateriat</h2>
<ul id="dishes"></ul>

<h2>Ruokaaineet</h2>
<ul id="ingredients"></ul>

</body>

<script type="text/javascript">

const cookbook = Array.from(`
# 🌯 tortilla

- sitten lisää sienet
- lopuksi lisää lihaa, ja jauhe ennen kuin neste haihtuisi

tortillawraps
sipuli

viilikerma
salsa
tortillamauste


# 🍕 pitsa

eka 3 kerrosta tulee olla:
- tomaattikastike
- pitsamauste ja juustoraaste

pitsa
oliivit
kalkkuna
ananas
juustoraaste


# 🍖 karjalanpaisti

500 g karjalanpaistia
2 porkkanaa
sipuli
laakerinlehdet
kokonaiset maustepippurit
perunat
vihannekset


# 🍗 kana ja riisi

500 g kanafileet
riisi
vihannekset


# 🍜 wokki

wokkivihannekset
500-700 g marinoitu kana
nuudelit
mifu


# 🍝 soijabolognese

soijarouhe
makaroni
tomaattimurska
sipuli
valkosipuli
soijakastike
ketsuppi
kasvisliemikuutio
pizzamauste


# 🍲 broilerijauhelihapata

400 g kanajauheliha
sipuli
valkosipuli
mauste
curry
kaneli
liemikuutio
300 g perunoita
300 g bataattia
200 g maissi
sitruunamehu


# 🐓 broilerivuoka

makaroni
valkosipuli
300-500 g kanan fileesuikaleet
tomaattimurska
150 g pakastepinaatti


# 🐔 uunikana

400-600 g kanafileet
4-6 perunaa
2 porkkanaa
parsa- tai kukkakaali
oliivit
rosmariini


# 🐟 lohi

lohi
riisi?
perunat?
vihannekset


# 🐟 seiti

seiti
maissi
riisi?
500g perunaa?
curry?
kookosmaito tai -kerma


# 🐥 broilerikiusaus

1 kg peruna-sipulisekoitus
500 g kanasuikaleet
rosmariini
curry
2 kpl kerma
koskenlaskija-dippi
vihannekset


# 🐷 kinkkukiusaus

1 kg peruna-sipulisekoitus
300 g kotimaista keittokinkkua
2 kpl pippurikerma
vihannekset


# 🥕 vakioruoka

- käytä toi UFO höyrytinjuttu

porkkanat
700 g kanasuikaleet


# 🥘 pippurinen kanapata

400-600 g kanafileet
sipuli
100 g herkkusieniä
200 g ruusukaalia
kasvisliemikuutio
tomaattimurska
koskenlaskija-juusto
perunat


# 🥞 kuivakakku
@ dessert

2dl rusinoita
banaani
2dl banaanijogurttia
2 munaa
3dl sokeria
`.matchAll(/# (?<name>[^\n]+)\n(?:\@ (?<type>[^\n]+)\n)?\n(?:(?<instr>[^#]+?)\n\n)?(?<ingr>[^#]+?)(?:\n\n|\n$)/gms))
.map(mobj => {
    let name = mobj.groups.name;
    let type = mobj.groups.type;
    let instructions = mobj.groups.instr;
    let ingredients = mobj.groups.ingr.split('\n');
    return {name, type, instructions, ingredients}
});

// arranges ingredients the way I go through my local shop
const regexes = [
    /(cit+ari|K-supermarket|K-citimarket):?(sta)?/,
    /tokman+i/,
    /rosmari+ni|pi(ts|zz)amaus|la+kerinleh|kaneli|(musta.*)?pip+uri|cur+y|(kasvis)?liemi.*ku+t|(?!^(torti|gril+i).*)mauste/,
    /wraps|sinap+i|soijakast|salsa|tortil+.*maust|ketsup+i/,
    /kokis|kalja|olut|pepsi|mehu/,
    /banaani|omena|mandariini|sien(i|et)|vi+nirypä+le+|hedelmä|sitru+na|ru+suka+l/,
    /perun(a|oi).*(?!lastu|sipuli)|(?!^perun.*)sipuli|parsa.*ka+li|pork+ana|sala+t+i|(?!^wok.*)vihan+ek?s|bata+t+i/,
    /(?!^ko+kos.*)(mai[dt]o|kerma)|voi|jogh?urt|hi+va/,
    /(?!^veke)juusto|(koskenlask)?dip+i?/,
    /liha|kana(?!.*muna)|mifu/,
    /karjalanpa/,
    /kalk+una|kink+u/,
    /pitsa|ri+sipi+rak+a/,
    /perunalastu|pähkinä|sipsi/,
    /muna|oli+vi|toma+t+imurska|ananas|ko+kos/,
    /lei[pv]ä/,
    /nu+deli|makaroni|soija.*r.*h|ri+si|öljy/,
    /vehnäja|muro|mysli/,
    /sokeri/,
    /hernek/,
    /suklaa|kark+i/,
    /pakaste|jätski|jäätelö|wok+ivihan+e|peruna.*sipuli|sei[dt]i|mais+i|ben.*jer+y/,
    /vekeju+sto|loh[ei]/,
];

const html_ingredients = document.getElementById('ingredients');
const html_dishes = document.getElementById('dishes');
const menu = new Set();

function getRandDish() {
    let i, dish;
    do {
        i = Math.floor(Math.random() * cookbook.length);
        dish = cookbook[i];
    } while (menu.has(i) && dish.type === undefined);
    menu.add(i);
    return dish;
}

function hist() {
    return
}

function next() {
    // on button click
    if (menu.size > 0) {
        const hist = JSON.parse(Storage.getItem('hist'));
        hist.push(`${Date.now()},${JSON.stringify(menu)}`);
        Storage.setItem('hist', JSON.stringify(hist));
        menu.clear();
    }

    const js_ingredients = new Map();
    js_ingredients.set(-1, []);

    for (var i = 0; i < 7; i++) {
        let dish = getRandDish();
        let html_dish = document.createElement('li');
        html_dish.innerText = dish.name;
        html_dishes.appendChild(html_dish);

        for (let ingredient of dish.ingredients) {
            let found = false;
            for (let i = 0; i < regexes.length; i ++) {
                if (ingredient.match(regexes[i])) {
                    if (!js_ingredients.has(i)) {
                        js_ingredients.set(i, [])
                    }
                    js_ingredients.get(i).push(`${ingredient} (${dish.name})`);
                    found = true;
                    break;
                }
            }
            if (!found) {
                js_ingredients.get(-1).push(`NOT FOUND: ${ingredient} (${dish.name})`)
            }
        }
    }

    for (const [order, ingredients] of [...js_ingredients.entries()].sort((a, b) => {
        let left = parseInt(a[0]);
        let right = parseInt(b[0]);
        if (left < right) {
            return -1;
        }
        if (left < right) {
            return 1;
        }
        return 0;
    })) {
        for (const ingredient of ingredients) {
            let html_ingredient = document.createElement('li');
            html_ingredient.innerText = ingredient;
            html_ingredients.appendChild(html_ingredient);
        }
    }

}

next()
</script>

</html>
