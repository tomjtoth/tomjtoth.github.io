<!DOCTYPE html>
<html lang="fi">
    <head>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ostoslista</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
        <script type="text/javascript" src="conf.js"></script>
        <script type="text/javascript">
            // possibly more promises later (?)
            const all_promises = Promise.all([
                fetch("../ruokaohjeet/README.md")
                    .then((res) => res.text())
                    .catch((reason) => alert(`Failed to fetch recipies: ${reason}`)),
            ]);
        </script>
    </head>
    <body>
        <div id="controls">
            <button onclick="shuffle()" class="btn-shuffle">Shuffle</button>
            <button onclick="new_dish()" class="btn-dish-add">+&nbsp;ateriaa</button>
            <button onclick="new_item()" class="btn-item-add">+&nbsp;kamaa</button>
        </div>
        <h2>Ateriat</h2>
        <div id="dishes"></div>
        <h2>Ostettavat kamat</h2>
        <div id="items"></div>
    </body>
    <script type="text/javascript" src="func.js"></script>
    <script>
        all_promises.then((values) => main(values));
    </script>
</html>
