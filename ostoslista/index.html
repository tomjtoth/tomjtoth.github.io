<!DOCTYPE html>
<html lang="fi">
    <head>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>ostoslista</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js" integrity="sha512-LhccdVNGe2QMEfI3x4DVV3ckMRe36TfydKss6mJpdHjNFiV07dFpS2xzeZedptKZrwxfICJpez09iNioiSZ3hA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script type="text/javascript" src="conf.js"></script>
    </head>
    <body>
        <p>
            Tämä sivusto kasaa ruoka-ainekset suurin piirtein siihen järjestykseen jossa itse käyn omaa lähikauppani läpi. Kasaa kaverille <code>tomjtoth.github.io/ostoslista?dishes=0,1,5,6&items=jotain,kalja,kokis</code> oma lista.
            <br>
            <a href="..">Aloitussivuun</a>.
        </p>
        <div id="controls">
            <button onclick="deactivate_items()" title="ostettaviin kamoihin vaikuttaa">Pyyhki vihreät</button>
            <button onclick="shuffle()" title="niin monta, kuin nyt on, tai 3 kpl">Arvo ateriat</button>
            <button onclick="new_dish()" title="valitse ateria listasta">+ ateriaa</button>
            <button onclick="new_item()" title="lisää mitä tahansa asiaa listalle">+ kamaa</button>
        </div>
        <div id="selection"><div></div></div>
        <h2>Ateriat</h2>
        <div id="dishes"></div>
        <h2>Ostettavat kamat</h2>
        <div id="items"></div>
    </body>
    <script type="text/javascript" src="func.js"></script>
</html>
